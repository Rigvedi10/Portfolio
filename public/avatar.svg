<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sharath Rigvedi monogram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c1330"/>
      <stop offset="1" stop-color="#1a1140"/>
    </linearGradient>
    <linearGradient id="brand" x1="80" y1="120" x2="320" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.8">
      <stop stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>
  <circle cx="120" cy="110" r="180" fill="url(#glow)"/>

  <!-- neural network motif -->
  <g stroke="url(#brand)" stroke-width="1.4" opacity="0.45">
    <line x1="60" y1="90" x2="150" y2="160"/>
    <line x1="60" y1="90" x2="120" y2="260"/>
    <line x1="150" y1="160" x2="260" y2="120"/>
    <line x1="150" y1="160" x2="290" y2="250"/>
    <line x1="120" y1="260" x2="290" y2="250"/>
    <line x1="260" y1="120" x2="340" y2="190"/>
    <line x1="290" y1="250" x2="340" y2="190"/>
    <line x1="120" y1="260" x2="220" y2="330"/>
    <line x1="290" y1="250" x2="220" y2="330"/>
  </g>
  <g fill="url(#brand)">
    <circle cx="60" cy="90" r="6"/>
    <circle cx="150" cy="160" r="7"/>
    <circle cx="120" cy="260" r="6"/>
    <circle cx="260" cy="120" r="6"/>
    <circle cx="290" cy="250" r="7"/>
    <circle cx="340" cy="190" r="5"/>
    <circle cx="220" cy="330" r="6"/>
  </g>

  <!-- monogram -->
  <text x="200" y="232" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="150" font-weight="700" text-anchor="middle" fill="url(#brand)" filter="url(#soft)" opacity="0.5">SR</text>
  <text x="200" y="230" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="150" font-weight="700" text-anchor="middle" fill="#f6f8fc">SR</text>
</svg>
